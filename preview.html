<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="description" content="3D Product Preview — Explore products in 3D without AR.">
  <title>3D Product Preview — AR Shop</title>
  <link rel="stylesheet" href="css/styles.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <style>
    #preview-banner {
      position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
      z-index: 3000; padding: 8px 18px;
      background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(245,158,11,0.05));
      backdrop-filter: blur(12px); border: 1px solid rgba(245,158,11,0.2);
      border-radius: 20px; font-size: 12px; color: var(--accent);
      display: flex; align-items: center; gap: 8px;
    }
    #preview-banner a { color: var(--accent); text-decoration: underline; font-weight: 600; }
    #status-badge { display: none; }
    #marker-guide { display: none; }
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="loading-screen">
    <div class="loader-ring"></div>
    <div class="loader-brand">AR Shop</div>
    <div class="loader-text">Loading 3D Preview...</div>
  </div>

  <!-- Top Bar -->
  <div id="top-bar">
    <div class="app-title"><span class="icon">🛒</span><span>3D Preview</span></div>
    <div class="top-actions">
      <button id="btn-reset" class="btn-icon" aria-label="Reset">🔄</button>
    </div>
  </div>

  <div id="preview-banner">🖥️ 3D Preview Mode — <a href="index.html">Switch to AR</a></div>

  <div id="side-controls">
    <button id="btn-rotate-left" class="btn-icon" aria-label="Rotate left">↺</button>
    <button id="btn-rotate-right" class="btn-icon" aria-label="Rotate right">↻</button>
    <button id="btn-color" class="btn-icon" aria-label="Colors">🎨</button>
    <button id="btn-info" class="btn-icon" aria-label="Product info">ℹ️</button>
  </div>

  <div id="color-picker"></div>

  <div id="product-info">
    <div class="product-header">
      <div>
        <div class="product-name">Running Sneakers</div>
        <span class="product-category">Footwear</span>
      </div>
      <div class="product-price">$149</div>
    </div>
    <div class="product-dims">30 × 12 × 14 cm</div>
    <div class="product-desc">Lightweight performance running shoes with breathable mesh upper.</div>
  </div>

  <div id="furniture-panel">
    <div class="panel-header">
      <span class="panel-title">Choose Product</span>
      <span class="panel-count">6 items</span>
    </div>
    <div id="furniture-grid" class="furniture-grid"></div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { createProductModel, PRODUCT_CATALOG } from './js/furniture.js';
    import {
      initUI, hideLoading, showToast,
      setOnFurnitureChange, setOnColorChange,
      getCurrentFurnitureId, getCurrentColorIndex
    } from './js/ui.js';

    let scene, camera, renderer, controls, currentModel;

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x16213e);

      camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 50);
      camera.position.set(0, 0.5, 1.2);

      // Lighting
      scene.add(new THREE.HemisphereLight(0xaabbcc, 0x444466, 1.5));
      const dir = new THREE.DirectionalLight(0xffffff, 1.2);
      dir.position.set(2, 4, 3); dir.castShadow = true;
      dir.shadow.mapSize.set(1024, 1024);
      scene.add(dir);
      const fill = new THREE.DirectionalLight(0xfff0e6, 0.4);
      fill.position.set(-2, 2, -1);
      scene.add(fill);
      const point = new THREE.PointLight(0xF59E0B, 0.5, 10);
      point.position.set(0, 2, -1);
      scene.add(point);

      // Grid floor
      const grid = new THREE.GridHelper(6, 12, 0x444466, 0x333355);
      grid.position.y = 0;
      scene.add(grid);

      // Ground plane (for shadows)
      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(6, 6),
        new THREE.ShadowMaterial({ opacity: 0.2 })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);

      // Renderer
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.0;
      renderer.domElement.style.position = 'fixed';
      renderer.domElement.style.inset = '0';
      renderer.domElement.style.zIndex = '0';
      document.body.appendChild(renderer.domElement);

      // Orbit controls
      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 0.15, 0);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.minDistance = 0.3;
      controls.maxDistance = 5;
      controls.maxPolarAngle = Math.PI / 2;
      controls.update();

      // Place initial model
      placeModel('sneakers', 0);

      // UI callbacks
      setOnFurnitureChange((id, ci) => placeModel(id, ci));
      setOnColorChange((id, ci) => placeModel(id, ci));
      initUI();

      // Button overrides for preview
      document.getElementById('btn-reset')?.addEventListener('click', () => {
        if (currentModel) {
          currentModel.scale.set(1, 1, 1);
          currentModel.rotation.set(0, 0, 0);
          currentModel.position.set(0, 0, 0);
        }
        controls.reset();
        showToast('🔄 View reset');
      });
      document.getElementById('btn-rotate-left')?.addEventListener('click', () => {
        if (currentModel) currentModel.rotation.y -= Math.PI / 4;
      });
      document.getElementById('btn-rotate-right')?.addEventListener('click', () => {
        if (currentModel) currentModel.rotation.y += Math.PI / 4;
      });

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      renderer.setAnimationLoop(() => {
        controls.update();
        renderer.render(scene, camera);
      });
    }

    function placeModel(id, colorIndex) {
      if (currentModel) scene.remove(currentModel);
      currentModel = createProductModel(id, colorIndex);
      if (currentModel) {
        currentModel.position.set(0, 0, 0);
        scene.add(currentModel);
      }
    }

    init();
  </script>
</body>
</html>
